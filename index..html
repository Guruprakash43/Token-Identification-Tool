<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Token Finder — Design System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-subtle: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: 296px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      background: #080f1e;
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }

    .logo-title { font-weight: 700; font-size: 14px; }
    .logo-sub   { font-size: 11px; color: var(--text-subtle); }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .color-row { display: flex; gap: 8px; align-items: stretch; }

    input[type="color"] {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      padding: 2px; background: var(--bg-card);
      cursor: pointer; flex-shrink: 0;
    }

    .hex-input {
      flex: 1; background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 12px; color: var(--text);
      font-family: 'Fira Code','Cascadia Code','Consolas',monospace;
      font-size: 14px; outline: none;
      transition: border-color 0.15s; height: 44px;
    }
    .hex-input:focus { border-color: var(--accent); }

    .color-preview {
      height: 60px; border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: background 0.2s;
      display: flex; align-items: flex-end; padding: 6px 8px;
    }
    .preview-label {
      font-size: 11px; font-weight: 600;
      background: rgba(0,0,0,0.55); color: #fff;
      padding: 2px 7px; border-radius: 4px;
    }

    /* type list */
    .type-list { display: flex; flex-direction: column; gap: 3px; }

    .type-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 7px;
      border: 1px solid transparent; background: transparent;
      color: var(--text-muted); cursor: pointer;
      text-align: left; font-size: 13px; font-weight: 500;
      transition: all 0.12s; width: 100%;
    }
    .type-btn:hover { background: var(--bg-card); color: var(--text); }
    .type-btn.active {
      background: rgba(59,130,246,0.12);
      border-color: rgba(59,130,246,0.35);
      color: #93c5fd;
    }

    .type-icon {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .type-btn.active .type-icon { background: rgba(59,130,246,0.2); }

    .type-count {
      margin-left: auto; font-size: 10px;
      color: var(--text-subtle);
      background: rgba(255,255,255,0.05);
      padding: 1px 6px; border-radius: 20px;
    }

    /* toggles */
    .option-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; user-select: none;
    }
    .toggle {
      width: 34px; height: 18px;
      background: var(--border); border-radius: 20px;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle::after {
      content: ''; position: absolute;
      width: 12px; height: 12px;
      background: #fff; border-radius: 50%;
      top: 3px; left: 3px; transition: transform 0.2s;
    }
    .toggle.on { background: var(--accent); }
    .toggle.on::after { transform: translateX(16px); }

    /* search btn */
    .search-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 11px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
      width: 100%; margin-top: auto;
    }
    .search-btn:hover { background: var(--accent-hover); }
    .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Main ────────────────────────────────────────────── */
    .main { padding: 28px; overflow-y: auto; }

    .banner {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 13px 17px; border-radius: var(--radius);
      border: 1px solid; margin-bottom: 20px;
      font-size: 13px; line-height: 1.55;
    }
    .ban-exact  { background:rgba(34,197,94,0.08);  border-color:rgba(34,197,94,0.3);  color:#86efac; }
    .ban-near   { background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.3); color:#fcd34d; }
    .ban-approx { background:rgba(148,163,184,0.06); border-color:var(--border); color:var(--text-muted); }

    .results-meta {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .results-meta strong { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px,1fr));
      gap: 14px;
    }

    /* token card */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 11px; overflow: hidden;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .card:hover {
      border-color: rgba(59,130,246,0.4);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.12);
    }
    .card.is-exact { border-color: rgba(34,197,94,0.4); }

    .card-head {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .card-path {
      font-family: 'Fira Code','Consolas',monospace;
      font-size: 11px; color: #7dd3fc;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .badge {
      font-size: 9px; font-weight: 800;
      padding: 2px 7px; border-radius: 20px;
      flex-shrink: 0; letter-spacing: 0.04em;
    }
    .b-exact  { background:rgba(34,197,94,0.15);  color:#86efac; border:1px solid rgba(34,197,94,0.3); }
    .b-near   { background:rgba(245,158,11,0.15); color:#fcd34d; border:1px solid rgba(245,158,11,0.3); }
    .b-approx { background:rgba(148,163,184,0.08); color:var(--text-muted); border:1px solid var(--border); }

    .modes { display: grid; grid-template-columns: 1fr 1fr; }

    .mode-col { padding: 13px 14px 11px; }
    .mode-col + .mode-col { border-left: 1px solid var(--border); }

    .mode-head {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--text-subtle); margin-bottom: 8px;
    }

    .swatch {
      height: 46px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.18);
      margin-bottom: 8px; position: relative; overflow: hidden;
    }
    .checker {
      position: absolute; inset: 0;
      background-image: repeating-conic-gradient(#e2e8f0 0% 25%, #f8fafc 0% 50%);
      background-size: 12px 12px;
    }
    .swatch-fill { position: absolute; inset: 0; }

    .swatch-hex {
      font-family: 'Fira Code','Consolas',monospace;
      font-size: 10px; color: var(--text-subtle);
      margin-bottom: 5px; word-break: break-all;
    }

    .name-row { display: flex; align-items: flex-start; gap: 5px; }
    .token-name {
      font-family: 'Fira Code','Consolas',monospace;
      font-size: 10.5px; color: var(--text); font-weight: 600;
      word-break: break-all; flex: 1;
    }

    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-subtle); padding: 2px 3px;
      border-radius: 4px; flex-shrink: 0; margin-top: 1px;
      transition: color 0.12s, background 0.12s;
    }
    .copy-btn:hover { color: var(--accent); background: rgba(59,130,246,0.1); }
    .copy-btn.ok { color: var(--success); }

    /* per-mode alias line */
    .mode-alias {
      font-family: 'Fira Code','Consolas',monospace;
      font-size: 9.5px; color: var(--text-subtle);
      margin-top: 5px; display: flex; align-items: flex-start; gap: 4px;
      line-height: 1.4;
    }
    .alias-arrow {
      color: var(--text-subtle); opacity: 0.5; flex-shrink: 0; font-size: 9px; padding-top: 1px;
    }
    .alias-val {
      color: #a5b4fc; word-break: break-all;
    }

    /* matched-in indicator on the card header */
    .match-in {
      font-size: 9px; padding: 1px 6px; border-radius: 10px;
      background: rgba(59,130,246,0.12); color: #93c5fd;
      border: 1px solid rgba(59,130,246,0.25); flex-shrink: 0;
    }

    /* highlight the mode column where the input matched */
    .mode-col.is-matched { background: rgba(59,130,246,0.04); border-radius: 0 0 0 11px; }
    .mode-col.is-matched + .mode-col.is-matched { border-radius: 0 0 11px 0; }

    /* center states */
    .center {
      text-align: center; padding: 80px 40px; color: var(--text-muted);
    }
    .c-icon  { font-size: 44px; margin-bottom: 14px; opacity: 0.55; }
    .c-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .c-desc  { font-size: 13px; line-height: 1.65; max-width: 440px; margin: 0 auto; }
    .c-desc code {
      background: var(--bg-card); padding: 1px 5px;
      border-radius: 4px; font-family: monospace;
    }

    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

<script>
/* ─────────────────────────────────────────────────────────
   ELEMENT TYPE CONFIG
   ───────────────────────────────────────────────────────── */
const TYPES = [
  { id:'all',            label:'All Types',         icon:'✦',  groups:null },
  { id:'Text',           label:'Text',              icon:'𝐓',  groups:['Text'] },
  { id:'Background',     label:'Background',        icon:'▭',  groups:['Background'] },
  { id:'Border',         label:'Border',            icon:'⬜', groups:['Border'] },
  { id:'Icon',           label:'Icon',              icon:'◉',  groups:['Icon'] },
  { id:'Action',         label:'Action / Button',   icon:'⬛', groups:['Action'] },
  { id:'Interaction',    label:'Interaction State',  icon:'⚡', groups:['Interaction'] },
  { id:'Link',           label:'Link',              icon:'🔗', groups:['Link'] },
  { id:'Components',     label:'Components',        icon:'🧩', groups:['Components'] },
  { id:'Non-Contextual', label:'Palette / Brand',   icon:'🎨', groups:['Non-Contextual'] },
  { id:'Transparent',    label:'Transparent',       icon:'◌',  groups:['Transparent'] },
];

/* ─────────────────────────────────────────────────────────
   COLOR MATH
   ───────────────────────────────────────────────────────── */
function parseColor(s) {
  if (!s) return null;
  s = String(s).trim();
  const m = s.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)(?:\s*,\s*[\d.]+)?\s*\)/);
  if (m) return { r:+m[1], g:+m[2], b:+m[3], src:s };
  let h = s.replace('#','');
  if (h.length===3) h = h.split('').map(c=>c+c).join('');
  if (h.length!==6) return null;
  return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16), src:'#'+h.toLowerCase() };
}

function toLab(r,g,b) {
  const f = x => { x/=255; return x>0.04045?((x+0.055)/1.055)**2.4:x/12.92; };
  const rl=f(r),gl=f(g),bl=f(b);
  const X=(rl*0.4124+gl*0.3576+bl*0.1805)/0.95047;
  const Y=(rl*0.2126+gl*0.7152+bl*0.0722)/1.0;
  const Z=(rl*0.0193+gl*0.1192+bl*0.9505)/1.08883;
  const gf = t => t>0.008856?Math.cbrt(t):7.787*t+16/116;
  return { L:116*gf(Y)-16, a:500*(gf(X)-gf(Y)), b:200*(gf(Y)-gf(Z)) };
}

function dE(c1,c2) {
  if(!c1||!c2) return 999;
  const l1=toLab(c1.r,c1.g,c1.b), l2=toLab(c2.r,c2.g,c2.b);
  return Math.sqrt((l1.L-l2.L)**2+(l1.a-l2.a)**2+(l1.b-l2.b)**2);
}

/* ─────────────────────────────────────────────────────────
   TOKEN RESOLVER
   ───────────────────────────────────────────────────────── */
let TOKENS=[], GCOUNTS={};

function flat(obj,pfx,out) {
  for(const [k,v] of Object.entries(obj)) {
    const key=pfx?`${pfx}.${k}`:k;
    if(v&&typeof v==='object') { '$value' in v ? (out[key]=v['$value']) : flat(v,key,out); }
  }
}

function deref(val,...maps) {
  for(let i=0;i<9;i++) {
    const m=typeof val==='string'&&val.match(/^\{(.+)\}$/);
    if(!m) return val;
    const ref=m[1]; let found=false;
    for(const mp of maps) { if(ref in mp){val=mp[ref];found=true;break;} }
    if(!found) return val;
  }
  return val;
}

function buildTokens(raw) {
  // primitives
  const pL={},pD={};
  const prim=raw.find(d=>'_Primitive' in d)['_Primitive'];
  flat(prim.modes['Light']['Color'],'Color',pL);
  flat(prim.modes['Dark']['Color'], 'Color',pD);

  // semantic
  const sRaw={};
  const sem=raw.find(d=>'_Semantic' in d)['_Semantic'];
  flat(sem.modes['LP']['Color-Semantic'],'Color-Semantic',sRaw);
  const sL={},sD={};
  for(const [k,v] of Object.entries(sRaw)) { sL[k]=deref(v,sRaw,pL); sD[k]=deref(v,sRaw,pD); }

  // color tokens
  const cL={},cD={};
  const ct=raw.find(d=>'Color Tokens' in d)['Color Tokens'];
  flat(ct.modes['Light Mode']['Color'],'Color',cL);
  flat(ct.modes['Dark Mode']['Color'], 'Color',cD);

  const tokens=[];
  for(const [path,alias] of Object.entries(cL)) {
    const parts=path.split('.'); if(parts.length<3) continue;
    const group=parts[1], name=parts.slice(2).join('.');
    const darkAliasRaw = cD[path] ?? alias;
    const ls=String(deref(alias,       cL,sL,sRaw,pL));
    const ds=String(deref(darkAliasRaw,cD,sD,sRaw,pD));
    tokens.push({
      path,group,name,
      lightStr:ls,darkStr:ds,
      lightRgb:parseColor(ls),darkRgb:parseColor(ds),
      lightAlias:String(alias).replace(/[{}]/g,''),
      darkAlias :String(darkAliasRaw).replace(/[{}]/g,'')
    });
  }

  TOKENS=tokens;
  GCOUNTS={};
  for(const t of tokens) GCOUNTS[t.group]=(GCOUNTS[t.group]||0)+1;
  return tokens;
}

/* ─────────────────────────────────────────────────────────
   SEARCH
   ───────────────────────────────────────────────────────── */
function search(hex,groups,includeNear,showAll) {
  let pool=TOKENS;
  if(groups) pool=pool.filter(t=>groups.includes(t.group));
  if(showAll) return pool.map(t=>({...t,lightDist:0,darkDist:0,minDist:0}));

  const inp=parseColor(hex);
  if(!inp) return [];

  const scored=pool.map(t=>{
    const ld=dE(inp,t.lightRgb), dd=dE(inp,t.darkRgb), mn=Math.min(ld,dd);
    const matchedIn = ld<=dd ? 'light' : 'dark';
    return {...t,lightDist:ld,darkDist:dd,minDist:mn,matchedIn};
  }).sort((a,b)=>a.minDist-b.minDist);

  if(includeNear) return scored.filter(r=>r.minDist<25).slice(0,60);
  const exact=scored.filter(r=>r.minDist<2);
  return exact.length>0?exact.slice(0,30):scored.slice(0,12);
}

/* ─────────────────────────────────────────────────────────
   RENDER
   ───────────────────────────────────────────────────────── */
let selType='all', nearOn=true, allOn=false;

function renderTypes() {
  const list=document.getElementById('typeList');
  list.innerHTML='';
  for(const t of TYPES) {
    const cnt=t.groups?t.groups.reduce((s,g)=>s+(GCOUNTS[g]||0),0):TOKENS.length;
    const btn=document.createElement('button');
    btn.className='type-btn'+(t.id===selType?' active':'');
    btn.dataset.id=t.id;
    btn.innerHTML=`<span class="type-icon">${t.icon}</span><span>${t.label}</span><span class="type-count">${cnt}</span>`;
    btn.onclick=()=>{
      selType=t.id;
      document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    list.appendChild(btn);
  }
}

const CPY=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHK=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;

function copyTok(text,btn) {
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('ok'); btn.innerHTML=CHK;
    setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML=CPY;},1500);
  });
}

function badgeFor(d) {
  if(d<2)  return {l:'EXACT', c:'b-exact'};
  if(d<9)  return {l:'NEAR',  c:'b-near'};
  return        {l:'APPROX',c:'b-approx'};
}

function renderCard(r,isAllMode) {
  const {l,c}=isAllMode?{l:'TOKEN',c:'b-approx'}:badgeFor(r.minDist);
  const lMatched = !isAllMode && r.matchedIn==='light';
  const dMatched = !isAllMode && r.matchedIn==='dark';
  const matchLabel = isAllMode ? '' : (lMatched ? '☀️ matched light' : '🌙 matched dark');
  return `
<div class="card${(!isAllMode&&r.minDist<2)?' is-exact':''}">
  <div class="card-head">
    <span class="card-path" title="${r.path}">${r.path}</span>
    ${!isAllMode?`<span class="match-in">${matchLabel}</span>`:''}
    <span class="badge ${c}">${l}</span>
  </div>
  <div class="modes">
    <div class="mode-col${lMatched?' is-matched':''}">
      <div class="mode-head">☀️ Light Mode</div>
      <div class="swatch"><div class="checker"></div><div class="swatch-fill" style="background:${r.lightStr||'transparent'}"></div></div>
      <div class="swatch-hex">${r.lightStr||'—'}</div>
      <div class="mode-alias"><span class="alias-arrow">→</span><span class="alias-val">${r.lightAlias||''}</span></div>
      <div class="name-row">
        <span class="token-name">${r.name}</span>
        <button class="copy-btn" onclick="copyTok('${r.path}',this)" title="Copy token">${CPY}</button>
      </div>
    </div>
    <div class="mode-col${dMatched?' is-matched':''}">
      <div class="mode-head">🌙 Dark Mode</div>
      <div class="swatch"><div class="checker"></div><div class="swatch-fill" style="background:${r.darkStr||'transparent'}"></div></div>
      <div class="swatch-hex">${r.darkStr||'—'}</div>
      <div class="mode-alias"><span class="alias-arrow">→</span><span class="alias-val">${r.darkAlias||''}</span></div>
      <div class="name-row">
        <span class="token-name">${r.name}</span>
        <button class="copy-btn" onclick="copyTok('${r.path}',this)" title="Copy token">${CPY}</button>
      </div>
    </div>
  </div>
</div>`;
}

function renderMain(results,hex) {
  const main=document.getElementById('main');

  if(results===null) {
    main.innerHTML=`<div class="center"><div class="c-icon">🎨</div><div class="c-title">Find Your Color Token</div><div class="c-desc">Enter a hex color, select an element type, and click <strong>Find Tokens</strong> to get matching light &amp; dark mode tokens from your design system.</div></div>`;
    return;
  }

  if(!results.length) {
    main.innerHTML=`<div class="center"><div class="c-icon">🔍</div><div class="c-title">No Matches Found</div><div class="c-desc">No tokens match in this category. Try <em>All Types</em> or enable <em>Include nearest matches</em>.</div></div>`;
    return;
  }

  const ex=results.filter(r=>r.minDist<2).length;
  const nr=results.filter(r=>r.minDist>=2&&r.minDist<9).length;
  let bCls='ban-approx',bMsg='';

  if(allOn) {
    bMsg=`Showing all <strong>${results.length}</strong> tokens for <strong>${selType==='all'?'All Types':selType}</strong>`;
  } else if(ex>0) {
    bCls='ban-exact';
    bMsg=`✅ <strong>${ex}</strong> exact match${ex>1?'es':''} found for <strong>${hex}</strong>`;
  } else if(nr>0) {
    bCls='ban-near';
    bMsg=`🟡 No exact match for <strong>${hex}</strong> — showing <strong>${nr}</strong> near match${nr>1?'es':''}. Pick the most semantically appropriate token.`;
  } else {
    bMsg=`ℹ️ Approximate results for <strong>${hex}</strong> — no exact match exists. Use the closest semantically appropriate token.`;
  }

  const typeLabel=selType==='all'?'All Types':selType;
  main.innerHTML=`
<div class="banner ${bCls}">${bMsg}</div>
<div class="results-meta"><strong>${results.length}</strong>&nbsp;token${results.length!==1?'s':''}&nbsp;·&nbsp;${typeLabel}</div>
<div class="grid">${results.map(r=>renderCard(r,allOn)).join('')}</div>`;
}

/* ─────────────────────────────────────────────────────────
   EVENT WIRING
   ───────────────────────────────────────────────────────── */
const hexEl   = document.getElementById('hex');
const pickerEl= document.getElementById('picker');
const prevEl  = document.getElementById('preview');
const lblEl   = document.getElementById('prevLabel');
const btnEl   = document.getElementById('searchBtn');

function syncColor(h) {
  const rgb=parseColor(h); if(!rgb) return;
  prevEl.style.background=h; lblEl.textContent=h;
  pickerEl.value='#'+[rgb.r,rgb.g,rgb.b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

hexEl.addEventListener('input',e=>{ let v=e.target.value.trim(); if(!v.startsWith('#'))v='#'+v; syncColor(v); });
pickerEl.addEventListener('input',e=>{ hexEl.value=e.target.value; syncColor(e.target.value); });
hexEl.addEventListener('keydown',e=>{ if(e.key==='Enter') btnEl.click(); });

document.getElementById('nearToggle').addEventListener('click',()=>{
  nearOn=!nearOn;
  document.getElementById('nearSwitch').classList.toggle('on',nearOn);
});

document.getElementById('allToggle').addEventListener('click',()=>{
  allOn=!allOn;
  document.getElementById('allSwitch').classList.toggle('on',allOn);
});

btnEl.addEventListener('click',()=>{
  let h=hexEl.value.trim(); if(!h.startsWith('#'))h='#'+h;
  const tc=TYPES.find(t=>t.id===selType);
  renderMain(search(h,tc?.groups||null,nearOn,allOn),h);
});

/* ─────────────────────────────────────────────────────────
   BOOT — supports both inline data and fetch modes
   ───────────────────────────────────────────────────────── */
function boot(data) {
  buildTokens(data);
  renderTypes();
  renderMain(null,'');
  btnEl.textContent='🔍  Find Tokens';
  btnEl.disabled=false;
  syncColor('#2563eb');
}

if (typeof __INLINE_TOKEN_DATA__ !== 'undefined') {
  /* Standalone mode: JSON is embedded directly in this file */
  boot(__INLINE_TOKEN_DATA__);
} else {
  /* Server mode: load export.json from same directory */
  fetch('./export.json')
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(boot)
    .catch(err=>{
      document.getElementById('main').innerHTML='<div class="center"><div class="c-icon">&#x26A0;&#xFE0F;</div><div class="c-title">Could not load export.json</div><div class="c-desc">Make sure <code>export.json</code> is in the same folder and open via a local server.<br><br><strong>VS Code:</strong> Right-click &rarr; Open with Live Server<br><strong>Terminal:</strong> <code>npx serve .</code><br><br><em>'+err.message+'</em></div></div>';
    });
}
